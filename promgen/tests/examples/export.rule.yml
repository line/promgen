groups:
  - name: promgen.example.com
    rules:
      - alert: example-rule
        annotations:
          rule: http://promgen.example.com/rule/1
          summary: Example rule summary
        expr: up==1
        for: 1s
        labels:
          severity: high
      - alert: Site Rule
        annotations:
          rule: http://promgen.example.com/rule/3
        expr: up == 1
        for: 1m
        labels: {}
